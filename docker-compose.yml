services:
  backend:
    image: huddletag-backend:v1
    environment:
      JOBS_DIR: /jobs
      DB_PATH: /data/db/huddletag.db
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./jobs:/jobs:ro       # drop your job folders here
      - huddletag_db:/data/db # SQLite persistence
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/jobs')"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

  frontend:
    image: huddletag-frontend:v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  huddletag_db:
